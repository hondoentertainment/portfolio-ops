<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Ops — Command Brief</title>
    <style>
      :root {
        --bg: #060912;
        --surface: #0c1222;
        --border: rgba(148, 163, 184, 0.15);
        --text: #f1f5f9;
        --muted: #94a3b8;
        --accent: #22d3ee;
        --amber: #fbbf24;
        --red: #fb7185;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      .wrap { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem; }
      h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
      .sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }
      .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); margin-bottom: 2rem; }
      .stat {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
      }
      .stat label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
      .stat strong { font-size: 1.75rem; }
      section { margin-bottom: 2rem; }
      h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.75rem; }
      ul { list-style: none; padding: 0; margin: 0; }
      li {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.75rem 1rem;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
      }
      .sev { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; padding: 0.15rem 0.4rem; border-radius: 4px; margin-right: 0.5rem; }
      .sev-critical { background: rgba(251,113,133,0.15); color: var(--red); }
      .sev-high { background: rgba(251,191,36,0.15); color: var(--amber); }
      .sev-medium { background: rgba(148,163,184,0.15); color: var(--muted); }
      .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1.5rem; }
      a.btn {
        display: inline-block;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        background: var(--accent);
        color: #041016;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.875rem;
      }
      a.btn.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
      .empty { color: var(--muted); font-size: 0.875rem; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Portfolio Ops</h1>
      <p class="sub" id="meta">Loading context…</p>

      <div class="grid" id="stats"></div>

      <section>
        <h2>Morning Brief</h2>
        <div id="brief"></div>
      </section>

      <section>
        <h2>Action Queue</h2>
        <ul id="events"></ul>
      </section>

      <div class="actions">
        <a class="btn secondary" href="../SYSTEM-ARCHITECTURE.md">Architecture doc</a>
        <a class="btn" href="https://central-command-e11bzxnug-hondo4185-5820s-projects.vercel.app" target="_blank" rel="noreferrer">Central Command</a>
        <a class="btn" href="https://stagecraft-kappa.vercel.app" target="_blank" rel="noreferrer">Stagecraft</a>
        <a class="btn secondary" href="https://portfolio-ops-seven.vercel.app" target="_blank" rel="noreferrer">Portfolio Ops</a>
      </div>
    </div>
    <script>
      async function load() {
        try {
          const res = await fetch('/data/portfolio-context.json')
          if (!res.ok) throw new Error('Run npm run ingest first')
          const ctx = await res.json()
          document.getElementById('meta').textContent =
            `Phase ${ctx.phase} · Generated ${new Date(ctx.generatedAt).toLocaleString()}`
          document.getElementById('stats').innerHTML = `
            <div class="stat"><label>CI issues</label><strong>${ctx.summary.ciIssueCount ?? '—'}</strong></div>
            <div class="stat"><label>Deploy apps</label><strong>${ctx.summary.deployProjectCount}</strong></div>
            <div class="stat"><label>Open events</label><strong>${ctx.summary.openEvents}</strong></div>
          `
          const brief = ctx.morningBrief
          document.getElementById('brief').innerHTML = Object.entries(brief.sections)
            .map(([k, items]) => `<p><strong>${k}</strong>: ${items.length ? items.join(' · ') : 'None'}</p>`)
            .join('')
          const list = document.getElementById('events')
          if (!ctx.events.length) {
            list.innerHTML = '<li class="empty">No open events — run ingest after updating Central Command data.</li>'
            return
          }
          list.innerHTML = ctx.events.slice(0, 20).map((e) =>
            `<li><span class="sev sev-${e.severity}">${e.severity}</span>${e.title}</li>`
          ).join('')
        } catch (err) {
          document.getElementById('meta').textContent = err.message
        }
      }
      load()
    </script>
  </body>
</html>
