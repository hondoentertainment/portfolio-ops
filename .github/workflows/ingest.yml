name: Ingest portfolio context

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/ingest-phase1.mjs
      - name: Commit context if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/portfolio-context.json
          git diff --staged --quiet || git commit -m "chore: refresh portfolio context"
          git push
